name: OKJ BTC/JPY 価格通知

on:
  schedule:
    # 5 分ごとに実行（GitHub Actions の cron は最短 5 分間隔）
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      reset_state:
        description: "state ファイルを破棄して初期化する（次の境界越えまで通知が出ない）"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: okcoin-price-notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/okcoin_price_notify.py
          sparse-checkout-cone-mode: false

      - name: Restore state cache
        id: cache-restore
        if: ${{ github.event.inputs.reset_state != 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: okcoin-state.json
          key: okcoin-state-v1-${{ github.run_id }}
          restore-keys: |
            okcoin-state-v1-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run notifier
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          NTFY_USERNAME: ${{ secrets.NTFY_USERNAME }}
          NTFY_PASSWORD: ${{ secrets.NTFY_PASSWORD }}
          THRESHOLD_JPY: ${{ vars.THRESHOLD_JPY }}
          OKCOIN_STATE_FILE: okcoin-state.json
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "::error::Secret NTFY_TOPIC is not set. See scripts/okcoin_price_notify_README.md"
            exit 1
          fi
          python scripts/okcoin_price_notify.py

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: okcoin-state.json
          key: okcoin-state-v1-${{ github.run_id }}
