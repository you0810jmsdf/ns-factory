<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顧客マスタ — N's factory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <a href="../index.html" class="brand">N's factory</a>
  <nav>
    <a href="index.html"><span>書類台帳</span></a>
    <a href="customers.html" class="active"><span>顧客</span></a>
    <a href="products.html"><span>商品</span></a>
  </nav>
</header>

<div class="main-container">
  <div class="page-title">顧客マスタ</div>

  <div class="toolbar">
    <button class="btn btn-primary" id="btn-new">+ 新規登録</button>
    <div class="spacer"></div>
    <input type="text" class="form-control" id="search-input" placeholder="検索..." style="width:180px;">
    <button class="btn btn-secondary" id="btn-refresh">更新</button>
  </div>

  <!-- 新規/編集フォーム -->
  <div class="card" id="form-panel" style="display:none;">
    <div class="card-title" id="form-title">顧客登録</div>
    <input type="hidden" id="edit-id">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">顧客名 *</label>
        <input type="text" class="form-control" id="f-name" placeholder="山田 太郎">
      </div>
      <div class="form-group">
        <label class="form-label">敬称</label>
        <select class="form-control" id="f-honorific">
          <option value="様">様</option>
          <option value="御中">御中</option>
          <option value="">（なし）</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">郵便番号</label>
        <input type="text" class="form-control" id="f-zip" placeholder="000-0000">
      </div>
      <div class="form-group">
        <label class="form-label">住所</label>
        <input type="text" class="form-control" id="f-address" placeholder="千葉県...">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">電話</label>
        <input type="text" class="form-control" id="f-phone" placeholder="090-0000-0000">
      </div>
      <div class="form-group">
        <label class="form-label">メール</label>
        <input type="email" class="form-control" id="f-email" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">担当者名</label>
        <input type="text" class="form-control" id="f-contact" placeholder="田中 花子">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">備考</label>
      <textarea class="form-control" id="f-note" rows="2"></textarea>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="btn btn-primary" id="btn-submit">登録</button>
      <button class="btn btn-secondary" id="btn-cancel">キャンセル</button>
    </div>
  </div>

  <!-- 一覧テーブル -->
  <div class="card" style="padding:0;overflow:hidden;">
    <table class="data-table" id="cust-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>顧客名</th>
          <th>敬称</th>
          <th>電話</th>
          <th>メール</th>
          <th>担当者</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="cust-tbody">
        <tr><td colspan="7"><div class="empty-state"><span class="icon">&#x1F465;</span>読み込み中...</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/customers.js"></script>
</body>
</html>
