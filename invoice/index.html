<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>書類台帳 — N's factory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <a href="../index.html" class="brand">N's factory</a>
  <nav>
    <a href="index.html" class="active"><span>書類台帳</span></a>
    <a href="customers.html"><span>顧客</span></a>
    <a href="products.html"><span>商品</span></a>
  </nav>
</header>

<div class="main-container">
  <div class="page-title">
    書類台帳
    <span class="badge" id="doc-count-badge">読み込み中...</span>
  </div>

  <!-- タブ -->
  <div class="tabs">
    <button class="tab-btn active" data-type="all">すべて</button>
    <button class="tab-btn" data-type="quote">見積書</button>
    <button class="tab-btn" data-type="invoice">請求書</button>
    <button class="tab-btn" data-type="receipt">領収書</button>
  </div>

  <!-- ツールバー -->
  <div class="toolbar">
    <button class="btn btn-primary" id="btn-new-quote">+ 見積書 新規作成</button>
    <button class="btn btn-ghost" id="btn-new-invoice">+ 請求書 新規作成</button>
    <button class="btn btn-ghost" id="btn-new-receipt">+ 領収書 新規作成</button>
    <div class="spacer"></div>
    <input type="text" class="form-control" id="search-input" placeholder="検索..." style="width:180px;">
    <button class="btn btn-secondary" id="btn-refresh" title="更新"><span class="spinner" id="refresh-spinner" style="display:none;"></span> 更新</button>
  </div>

  <!-- テーブル -->
  <div class="card" style="padding:0; overflow:hidden;">
    <table class="data-table" id="doc-table">
      <thead>
        <tr>
          <th>書類番号</th>
          <th>種別</th>
          <th>発行日</th>
          <th>顧客名</th>
          <th>件名</th>
          <th>合計</th>
          <th>状態</th>
          <th>Drive</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="doc-tbody">
        <tr><td colspan="9" class="empty-state"><span class="icon">&#x1F4C4;</span>読み込み中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/list.js"></script>
</body>
</html>
