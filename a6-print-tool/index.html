<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A6リフィル印刷ツール | N's factory</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ===== リセット ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ===== カスタムプロパティ ===== */
:root {
  --line-h: 0mm;
  --memo-gap: 4mm;
  --time-font: 1.9mm;
  --time-label-top: 0.3mm;
  --text-wm-size: 20mm;
  --text-wm-angle: 0deg;
  --text-wm-x: 0mm;
  --text-wm-y: 0mm;
  --month-cal-top: 1mm;
  --month-cal-right: 1mm;
  --font-brand:      'Times New Roman', Times, serif;
  --font-date-num:   'Noto Sans JP', sans-serif;
  --font-date-wd:    'Noto Sans JP', sans-serif;
  --font-month-abbr: 'Times New Roman', Times, serif;
  --font-text-wm:    'Noto Sans JP', sans-serif;
  --owl-wm-x: 0mm;
  --owl-wm-y: 0mm;
  --img-wm-x: 0mm;
  --img-wm-y: 0mm;
  --img-wm-size: 50mm;
  --img-wm-opacity: 0.08;
}

/* ===== 画面UI ===== */
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #dde1e7;
  min-height: 100vh;
}

#ctrl-toggle-btn {
  position: fixed; top: 10px; left: 10px; z-index: 200;
  width: 36px; height: 36px; border-radius: 6px;
  background: #1a1a2e; color: #7ec8e3; border: 1px solid #444;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
#controls {
  position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
  background: #1a1a2e; color: #eee; overflow-y: auto; padding: 12px;
  font-size: 11px; z-index: 100;
  transform: translateX(-100%); transition: transform 0.25s ease;
}
#controls.open { transform: translateX(0); }
#controls h2 { font-size: 13px; color: #7ec8e3; margin-bottom: 10px; }
.ctrl-section { margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 10px; }
.ctrl-section h3 { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.ctrl-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
.ctrl-row label { min-width: 80px; color: #ccc; }
.ctrl-row input[type=range] { flex: 1; min-width: 80px; accent-color: #7ec8e3; }
.ctrl-row input[type=date], .ctrl-row select, .ctrl-row input[type=text], .ctrl-row input[type=month] {
  flex: 1; background: #2a2a4a; border: 1px solid #444; color: #eee;
  padding: 3px 5px; border-radius: 3px; font-size: 10px;
}
.ctrl-row input[type=number] {
  width: 52px; background: #2a2a4a; border: 1px solid #444; color: #eee;
  padding: 3px 5px; border-radius: 3px; font-size: 10px; text-align: right;
}
.ctrl-row .val { min-width: 28px; text-align: right; color: #7ec8e3; font-size: 10px; }
.btn-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; }
button { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: 600; }
.btn-primary { background: #7ec8e3; color: #1a1a2e; }
.btn-secondary { background: #444; color: #eee; }
.btn-toggle { background: #2a2a4a; color: #aaa; border: 1px solid #555; }
.btn-toggle.on { background: #7ec8e3; color: #1a1a2e; border-color: #7ec8e3; }
.side-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 8px; white-space: nowrap;
}
.side-badge.front { background: rgba(126,200,227,0.2); border: 1px solid #7ec8e3; color: #7ec8e3; }
.side-badge.back  { background: rgba(211,84,0,0.25);   border: 1px solid #d35400; color: #f0b27a; }
#preview { margin-left: 0; padding: 60px 20px 20px; display: flex; flex-direction: column; align-items: center; gap: 24px; }
body.panel-open #preview { margin-left: 280px; }

/* ===== A4ページ ===== */
.a4-page {
  width: 210mm;
  height: 297mm;
  background: white;
  position: relative;
  box-shadow: 0 6px 24px rgba(0,0,0,0.3);
  zoom: 0.65;
  flex-shrink: 0;
}

/* ===== A6スロット ===== */
.a6-slot {
  position: absolute;
  width: 105mm;
  height: 143.5mm;
  overflow: hidden;
}
.slot-TL { top: 5mm;     left: 0mm;    }
.slot-TR { top: 5mm;     left: 105mm;  }
.slot-BL { top: 148.5mm; left: 0mm;    }
.slot-BR { top: 148.5mm; left: 105mm;  }

/* ===== カット線・トンボ ===== */
.cut-v {
  position: absolute;
  top: 0; left: 105mm;
  width: 0; height: 297mm;
  border-left: 0.35mm dashed #bbb;
  pointer-events: none;
}
.cut-h {
  position: absolute;
  top: 148.5mm; left: 0;
  width: 210mm; height: 0;
  border-top: 0.35mm dashed #bbb;
  pointer-events: none;
}
.crop-cross {
  position: absolute;
  left: 105mm; top: 148.5mm;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.crop-cross::before {
  content: '';
  position: absolute;
  width: 5mm; height: 0.3mm;
  background: #999;
  top: -0.15mm; left: -2.5mm;
}
.crop-cross::after {
  content: '';
  position: absolute;
  width: 0.3mm; height: 5mm;
  background: #999;
  top: -2.5mm; left: -0.15mm;
}

/* ===== デイリーページ本体 ===== */
.daily-page {
  width: 105mm;
  height: 143.5mm;
  display: flex;
  position: relative;
}

/* 穴ストリップ */
.hole-strip {
  width: 10mm;
  flex-shrink: 0;
  position: relative;
}
.hole-strip.left {
  border-right: 0.3mm solid #e0e0e0;
  order: -1;
}
.hole-strip.right {
  border-left: 0.3mm solid #e0e0e0;
  order: 1;
}
.hole {
  position: absolute;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 3.5mm;
  height: 3.5mm;
  border: 0.3mm solid #c8c8c8;
  border-radius: 50%;
  background: white;
}
/* 穴ビセクターライン（3穴目と4穴目の中間=71.75mm） */
.hole-bisector {
  position: absolute;
  top: 71.75mm;
  left: 0;
  width: 2mm;
  height: 0;
  border-top: 0.2mm dashed #bbb;
  pointer-events: none;
}

/* ページコンテンツ */
.page-body {
  flex: 1;
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 0 2.5mm;
  min-width: 0;
  overflow: hidden;
  position: relative;
}

/* 日付ヘッダー */
.date-header {
  height: 13mm;
  flex-shrink: 0;
  border-bottom: 0.45mm solid #222;
  display: flex;
  align-items: center;
  gap: 2mm;
  padding: 1mm 0;
  position: relative;
}
.date-num {
  font-size: 9.5mm;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.5mm;
  font-family: var(--font-date-num, 'Noto Sans JP', sans-serif);
}
.date-meta {
  display: flex;
  flex-direction: column;
  gap: 0.8mm;
}
.date-ym   { font-size: 2mm;   color: #999; letter-spacing: 0.3mm; }
.date-wd   { font-size: 3.2mm; font-weight: 700; font-family: var(--font-date-wd, 'Noto Sans JP', sans-serif); }
.is-sun .date-num, .is-sun .date-wd { color: #c0392b; }
.is-sat .date-num, .is-sat .date-wd { color: #2471a3; }

/* N's factory ブランド（中央配置） */
.ns-brand {
  font-family: var(--font-brand, 'Times New Roman', Times, serif);
  font-size: 2.6mm;
  color: #555;
  letter-spacing: 0.3mm;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  bottom: 0.8mm;
  white-space: nowrap;
}

/* 月名（英語3文字）大表示 */
.month-abbr-large {
  font-family: var(--font-month-abbr, 'Times New Roman', Times, serif);
  font-size: 7mm;
  font-weight: 700;
  color: #888;
  letter-spacing: 0.5mm;
  margin-left: auto;
  align-self: flex-end;
  padding-bottom: 0.5mm;
  line-height: 1;
  flex-shrink: 0;
}

/* 時間グリッド */
.time-grid {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-bottom: 0.3mm solid #ccc;
  overflow: hidden;
}
.time-row {
  flex: 1;
  display: flex;
  align-items: stretch;
  min-height: var(--line-h, 0mm);
}
.time-row:not(:last-child) { border-bottom: 0.2mm solid #ebebeb; }
.time-row:nth-child(even)  { background: #fafafa; }
.time-label {
  width: 7mm;
  font-size: var(--time-font, 1.9mm);
  color: #bbb;
  text-align: right;
  padding: 0 1mm 0 0;
  transform: translateY(var(--time-label-top, 0.3mm));
  flex-shrink: 0;
  border-right: 0.2mm solid #ddd;
  line-height: 1;
}
.time-fill { flex: 1; }

/* メモ欄 */
.memo-section {
  flex-shrink: 0;
  height: 23mm;
  padding-top: 1.5mm;
  display: flex;
  flex-direction: column;
}
.memo-title {
  font-size: 1.8mm;
  color: #bbb;
  letter-spacing: 1mm;
  margin-bottom: 1mm;
  flex-shrink: 0;
}
.memo-lines {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: var(--memo-gap, 4mm);
  overflow: hidden;
  padding-top: 0.5mm;
}
.memo-line {
  flex-shrink: 0;
  height: 0;
  border-bottom: 0.2mm solid #e5e5e5;
}

/* ページ番号 */
.page-num {
  flex-shrink: 0;
  height: 3mm;
  font-size: 1.8mm;
  color: #d5d5d5;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 0.5mm;
}

/* フクロウロゴ透かし */
.watermark-logo {
  position: absolute;
  width: 38mm;
  height: 37.2mm;
  top: calc(50% + var(--owl-wm-y, 0mm));
  left: calc(50% + var(--owl-wm-x, 0mm));
  transform: translate(-50%, -50%);
  opacity: 0.07;
  pointer-events: none;
}

/* テキスト透かし */
.text-watermark {
  position: absolute;
  top: calc(50% + var(--text-wm-y, 0mm));
  left: calc(50% + var(--text-wm-x, 0mm));
  transform: translate(-50%, -50%) rotate(var(--text-wm-angle, 0deg));
  font-size: var(--text-wm-size, 20mm);
  font-weight: 900;
  color: #000;
  opacity: 0.05;
  pointer-events: none;
  z-index: 1;
  line-height: 1;
  font-family: var(--font-text-wm, 'Noto Sans JP', sans-serif);
  white-space: nowrap;
}

/* ===== 月カレンダー ===== */
.month-cal {
  position: absolute;
  top: var(--month-cal-top, 1mm);
  right: var(--month-cal-right, 1mm);
  width: 30mm;
  background: rgba(255,255,255,0.93);
  border-radius: 0.5mm;
  padding: 0 0 0.5mm;
  pointer-events: none;
  z-index: 2;
}
.mc-header {
  font-size: 2mm;
  font-weight: 700;
  text-align: center;
  padding: 1mm 0 0.5mm;
  color: #333;
  letter-spacing: 0.3mm;
}
.mc-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 0 0.5mm 0.5mm;
  gap: 0;
}
.mc-wd {
  font-size: 1.5mm;
  text-align: center;
  color: #aaa;
  padding: 0.2mm 0;
}
.mc-wd.sun { color: #c0392b; }
.mc-wd.sat { color: #2471a3; }
.mc-day {
  font-size: 1.8mm;
  text-align: center;
  padding: 0.3mm 0;
  line-height: 1.2;
}
.mc-day.sun { color: #c0392b; }
.mc-day.sat { color: #2471a3; }
.mc-day.cur {
  background: #222;
  color: white;
  border-radius: 50%;
  font-weight: 700;
}

/* 画像透かし */
.img-wm {
  position: absolute; pointer-events: none; z-index: 1;
  top: calc(50% + var(--img-wm-y, 0mm)); left: calc(50% + var(--img-wm-x, 0mm));
  transform: translate(-50%, -50%);
  width: var(--img-wm-size, 50mm); height: auto;
  opacity: var(--img-wm-opacity, 0.08);
}

/* ===== 更新履歴モーダル ===== */
.history-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:300; align-items:center; justify-content:center; }
.history-overlay.open { display:flex; }
.history-box { background:#1a1a2e; color:#eee; border-radius:8px; padding:20px; width:min(480px,92vw); max-height:80vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
.history-box h3 { font-size:13px; color:#7ec8e3; margin-bottom:12px; }
.history-entry { border-top:1px solid #333; padding:10px 0; font-size:10px; line-height:1.6; }
.history-entry:first-of-type { border-top:none; }
.history-date { color:#aaa; font-size:9px; }
.history-type { display:inline-block; padding:1px 6px; border-radius:3px; font-size:9px; font-weight:700; margin-left:6px; }
.history-type.feat { background:#1a3a1a; color:#7ec8e3; }
.history-type.fix  { background:#3a1a1a; color:#f0b27a; }
.history-type.improve { background:#1a1a3a; color:#b27af0; }
.history-title { font-weight:700; margin-top:3px; }
.history-detail { color:#bbb; margin-top:2px; }
.history-close { float:right; background:#444; color:#eee; border:none; border-radius:4px; padding:4px 10px; cursor:pointer; font-size:10px; }

/* ===== チェックリスト ===== */
.cl-block { position: absolute; z-index: 3; pointer-events: none; line-height: 1.4; }
.cl-title { font-weight: 700; padding-bottom: 0.3mm; border-bottom: 0.2mm solid #555; margin-bottom: 0.5mm; white-space: nowrap; }
.cl-item { display: flex; align-items: center; gap: 0.6mm; white-space: nowrap; }
.cl-checkbox { width: 1.2em; height: 1.2em; border: 0.2mm solid #555; flex-shrink: 0; display: inline-block; }
.ctrl-row textarea { flex: 1; background: #2a2a4a; border: 1px solid #444; color: #eee; padding: 3px 5px; border-radius: 3px; font-size: 10px; resize: vertical; }

/* ===== 印刷 ===== */
@media print {
  body { background: white; margin: 0; padding: 0; }
  #ctrl-toggle-btn, #controls { display: none !important; }
  #preview { padding: 0; margin-left: 0 !important; }
  .a4-page { zoom: 1; box-shadow: none; margin: 0; break-after: page; }
}
@page { size: A4 portrait; margin: 0mm; }
</style>
</head>
<body>

<!-- ===== サイドバー開閉ボタン ===== -->
<button id="ctrl-toggle-btn" onclick="toggleSidebar()">☰</button>

<!-- ===== サイドバーコントロール ===== -->
<div id="controls">
  <h2>A6リフィル印刷ツール</h2>

  <!-- 印刷モード -->
  <div class="ctrl-section">
    <h3>印刷モード</h3>
    <div class="ctrl-row">
      <label>モード</label>
      <select id="printMode" onchange="togglePrintMode()">
        <option value="single">単ページ</option>
        <option value="monthly">月単位</option>
      </select>
    </div>
    <div class="ctrl-row" id="monthlyPickerCtrl" style="display:none">
      <label>対象月</label>
      <input type="month" id="monthPicker" onchange="render()">
    </div>
    <div class="btn-row">
      <button class="btn-toggle on" id="btnOdd" onclick="togglePageSide('front')">表面</button>
      <button class="btn-toggle" id="btnEven" onclick="togglePageSide('back')">裏面</button>
    </div>
  </div>

  <!-- 日付設定 -->
  <div class="ctrl-section">
    <h3>日付設定</h3>
    <div class="ctrl-row">
      <label>開始日</label>
      <input type="date" id="startDate">
    </div>
    <div class="btn-row">
      <button class="btn-toggle on" id="btnJA" onclick="setLang(false)">日本語</button>
      <button class="btn-toggle" id="btnEN" onclick="setLang(true)">English</button>
    </div>
  </div>

  <!-- 時間設定 -->
  <div class="ctrl-section">
    <h3>時間設定</h3>
    <div class="ctrl-row">
      <label>開始h</label>
      <input type="range" id="startHour" min="0" max="23" step="1" value="6" oninput="document.getElementById('startHourVal').textContent=this.value;render()">
      <span class="val" id="startHourVal">6</span>
    </div>
    <div class="ctrl-row">
      <label>終了h</label>
      <input type="range" id="endHour" min="0" max="23" step="1" value="22" oninput="document.getElementById('endHourVal').textContent=this.value;render()">
      <span class="val" id="endHourVal">22</span>
    </div>
    <div class="ctrl-row">
      <label>ライン間隔</label>
      <input type="range" id="lineSpacing" min="0" max="15" step="0.5" value="0" oninput="document.getElementById('lineSpacingVal').textContent=this.value;updateVars()">
      <span class="val" id="lineSpacingVal">0</span>
    </div>
    <div class="ctrl-row">
      <label>メモ間隔</label>
      <input type="range" id="memoGap" min="1" max="12" step="0.5" value="4" oninput="document.getElementById('memoGapVal').textContent=this.value;updateVars()">
      <span class="val" id="memoGapVal">4</span>
    </div>
    <div class="ctrl-row">
      <label>時刻文字</label>
      <input type="range" id="timeFontSize" min="1" max="4" step="0.1" value="1.9" oninput="document.getElementById('timeFontSizeVal').textContent=this.value;updateVars()">
      <span class="val" id="timeFontSizeVal">1.9</span>
    </div>
    <div class="ctrl-row">
      <label>時刻Y</label>
      <input type="range" id="timeLabelTop" min="-10" max="20" step="0.1" value="0.3" oninput="document.getElementById('timeLabelTopVal').textContent=this.value;updateVars()">
      <span class="val" id="timeLabelTopVal">0.3</span>
    </div>
  </div>

  <!-- 表示要素 -->
  <div class="ctrl-section">
    <h3>表示要素</h3>
    <div class="btn-row">
      <button class="btn-toggle on" id="btnCutLines" onclick="toggleOpt('showCutLines','btnCutLines')">カット線</button>
      <button class="btn-toggle on" id="btnHoleLine" onclick="toggleOpt('showHoleLine','btnHoleLine')">穴仕切線</button>
      <button class="btn-toggle on" id="btnHoles" onclick="toggleOpt('showHoles','btnHoles')">穴ガイド</button>
    </div>
    <div class="btn-row">
      <button class="btn-toggle" id="btnHoleBisect" onclick="toggleOpt('showHoleBisect','btnHoleBisect')">穴中心</button>
      <button class="btn-toggle" id="btnLogo" onclick="toggleOpt('showLogo','btnLogo')">ロゴ透かし</button>
      <button class="btn-toggle on" id="btnMonthAbbr" onclick="toggleOpt('showMonthAbbr','btnMonthAbbr')">月名（英）</button>
    </div>
    <div class="btn-row">
      <button class="btn-toggle" id="btnTextWm" onclick="toggleOpt('showTextWm','btnTextWm')">テキスト透かし</button>
      <button class="btn-toggle" id="btnImgWm" onclick="toggleOpt('showImgWm','btnImgWm')">画像透かし</button>
      <button class="btn-toggle" id="btnMonthCal" onclick="toggleOpt('showMonthCal','btnMonthCal')">月カレンダー</button>
    </div>
  </div>

  <!-- テキスト透かし -->
  <div class="ctrl-section">
    <h3>テキスト透かし</h3>
    <div class="ctrl-row">
      <label>テキスト</label>
      <input type="text" id="textWmContent" value="N's factory" oninput="render()">
    </div>
    <div class="ctrl-row">
      <label>サイズ</label>
      <input type="range" id="textWmSize" min="3" max="60" step="1" value="20" oninput="document.getElementById('textWmSizeVal').textContent=this.value;updateVars()">
      <span class="val" id="textWmSizeVal">20</span>
    </div>
    <div class="ctrl-row">
      <label>角度</label>
      <input type="range" id="textWmAngle" min="-180" max="180" step="5" value="0" oninput="document.getElementById('textWmAngleVal').textContent=this.value;updateVars()">
      <span class="val" id="textWmAngleVal">0</span>
    </div>
    <div class="ctrl-row">
      <label>X</label>
      <input type="range" id="textWmX" min="-50" max="50" step="1" value="0" oninput="document.getElementById('textWmXVal').textContent=this.value;updateVars()">
      <span class="val" id="textWmXVal">0</span>
    </div>
    <div class="ctrl-row">
      <label>Y</label>
      <input type="range" id="textWmY" min="-70" max="70" step="1" value="0" oninput="document.getElementById('textWmYVal').textContent=this.value;updateVars()">
      <span class="val" id="textWmYVal">0</span>
    </div>
  </div>

  <!-- 月間カレンダー位置 -->
  <div class="ctrl-section">
    <h3>月間カレンダー位置</h3>
    <div class="ctrl-row">
      <label>CalTop</label>
      <input type="range" id="monthCalTop" min="-10" max="140" step="0.5" value="1" oninput="document.getElementById('monthCalTopVal').textContent=this.value;updateVars()">
      <span class="val" id="monthCalTopVal">1</span>
    </div>
    <div class="ctrl-row">
      <label>CalRight</label>
      <input type="range" id="monthCalRight" min="-10" max="70" step="0.5" value="1" oninput="document.getElementById('monthCalRightVal').textContent=this.value;updateVars()">

window.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const el = document.getElementById('startDate');
  el.value  = toDateVal(today);
  el.addEventListener('change', e => {
    const [y,m,d] = e.target.value.split('-').map(Number);
    startDate = new Date(y, m-1, d);
    render();
  });
  const mp = document.getElementById('monthPicker');
  mp.value = `${today.getFullYear()}-${pad(today.getMonth()+1)}`;
  initFontSelectors();
  initCLFontSelectors();
  updateVars();
  render();
});

function toDateVal(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }
function addDays(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}

function initFontSelectors() {
  const map = [
    { id: 'fontBrand',      def: "'Times New Roman', Times, serif" },
    { id: 'fontDateNum',    def: "'Noto Sans JP', sans-serif" },
    { id: 'fontDateWd',     def: "'Noto Sans JP', sans-serif" },
    { id: 'fontMonthAbbr',  def: "'Times New Roman', Times, serif" },
    { id: 'fontTextWm',     def: "'Noto Sans JP', sans-serif" },

  map.forEach(({ id, def }) => {

      opt.value = f.value;
      opt.textContent = f.label;
      if (f.value === def) opt.selected = true;
      sel.appendChild(opt);
    });
  });

function getCommonParams() {
  const startH = parseInt(document.getElementById('startHour').value) || 6;
  const endH   = parseInt(document.getElementById('endHour').value)   || 22;
  return {
    showCutLines:   opts.showCutLines,
    showHoleLine:   opts.showHoleLine,
    showHoles:      opts.showHoles,
    showHoleBisect: opts.showHoleBisect,
    showLogo:       opts.showLogo,
    showTextWm:     opts.showTextWm,
    textWmContent:  document.getElementById('textWmContent').value,
    showMonthAbbr:  opts.showMonthAbbr,
    showImgWm:      opts.showImgWm,
    hours:          Array.from({length: Math.max(1, endH - startH + 1)}, (_, i) => i + startH),
  };
}

function makeA4HTML(slots, showCutLines) {
  return `<div class="a4-page">
    ${showCutLines ? '<div class="cut-v"></div><div class="cut-h"></div><div class="crop-cross"></div>' : ''}
    ${['TL','TR','BL','BR'].map(pos =>
      `<div class="a6-slot slot-${pos}">${slots[pos] || ''}</div>`
    ).join('')}
  </div>`;
}

  render();

// ============================================================
// レンダリング
// ============================================================
function render() {
  const mode = document.getElementById('printMode').value;
  if (mode === 'monthly') renderMonthly();
  else renderSingle();
}

function renderSingle() {
  const p = getCommonParams();
  let html = '';
  for (const [side, map] of [['front', SLOT_MAP.front], ['back', SLOT_MAP.back]]) {
    if (side === 'front' && !showFront) continue;
    if (side === 'back'  && !showBack)  continue;
    const slots = {};
    for (const [pos, dayOffset] of Object.entries(map)) {
      const date = addDays(startDate, dayOffset);
      slots[pos] = buildDailyPage(date, dayOffset + 1, HOLE_SIDE[pos],
        p.showHoles, p.showHoleLine, p.showHoleBisect, p.showLogo, p.showTextWm, p.textWmContent, p.showMonthAbbr, p.hours, p.showImgWm);
    }
    html += makeA4HTML(slots, p.showCutLines);
  }
  document.getElementById('preview').innerHTML = html;
}

function renderMonthly() {
  const mp = document.getElementById('monthPicker').value;
  if (!mp) return;
  const [y, mo] = mp.split('-').map(Number);
  const daysInMonth = new Date(y, mo, 0).getDate();
  const sheetsNeeded = Math.ceil(daysInMonth / 8);
  const p = getCommonParams();

  let html = '';
  for (const [side, map] of [['front', SLOT_MAP.front], ['back', SLOT_MAP.back]]) {
    if (side === 'front' && !showFront) continue;
    if (side === 'back'  && !showBack)  continue;
    for (let s = 0; s < sheetsNeeded; s++) {
      const slots = {};
      for (const pos of ['TL','TR','BL','BR']) {
        const dayOffset = map[pos];
        const dayNum    = s * 8 + dayOffset + 1;
        if (dayNum <= daysInMonth) {
          const date = new Date(y, mo - 1, dayNum);
          slots[pos] = buildDailyPage(date, dayNum, HOLE_SIDE[pos],
            p.showHoles, p.showHoleLine, p.showHoleBisect, p.showLogo,
            p.showTextWm, p.textWmContent, p.showMonthAbbr, p.hours, p.showImgWm);
        }
      }
      html += makeA4HTML(slots, p.showCutLines);
    }
  }
  document.getElementById('preview').innerHTML = html;
}

// ============================================================
// 月カレンダーHTML構築
// ============================================================
function buildMonthCalHTML(date) {
  const y = date.getFullYear();
  const m = date.getMonth();
  const firstWd  = new Date(y, m, 1).getDay();
  const lastDate = new Date(y, m + 1, 0).getDate();
  const curDate  = date.getDate();

  const wdLabels = isEN ? ['Su','Mo','Tu','We','Th','Fr','Sa'] : ['日','月','火','水','木','金','土'];
  const wdHeaders = wdLabels
    .map((wd, i) => `<div class="mc-wd${i===0?' sun':i===6?' sat':''}">${wd}</div>`)
    .join('');

  let cells = '';
  for (let i = 0; i < firstWd; i++) cells += '<div class="mc-day"></div>';
  for (let d = 1; d <= lastDate; d++) {
    const wd  = (firstWd + d - 1) % 7;
    const cls = [wd===0?'sun':wd===6?'sat':'', d===curDate?'cur':''].filter(Boolean).join(' ');
    cells += `<div class="mc-day${cls?' '+cls:''}">${d}</div>`;
  }

  return `<div class="month-cal">
    <div class="mc-header">${y}.${pad(m+1)}</div>
    <div class="mc-grid">${wdHeaders}${cells}</div>
  </div>`;
}

function buildDailyPage(date, pageNum, holeSide, showHoles, showHoleLine, showHoleBisect, showLogo, showTextWm, textWmContent, showMonthAbbr, hours, showImgWm) {
  const wd      = date.getDay();

  const bisectorHTML = (showHoleBisect && holeSide === 'left') ? '<div class="hole-bisector"></div>' : '';
  const holeStripStyle = !showHoles ? 'visibility:hidden' : (!showHoleLine ? 'border:none' : '');
  const holeStripAttr  = holeStripStyle ? ` style="${holeStripStyle}"` : '';
  const holesHTML = `<div class="hole-strip ${holeSide}"${holeStripAttr}>
    ${bisectorHTML}
    ${HOLE_POSITIONS_MM.map(p => `<div class="hole" style="top:${p}mm;"></div>`).join('')}
  </div>`;

  const watermarkHTML = showLogo
    ? `<svg class="watermark-logo" viewBox="0 0 323.67773 316.20041" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(89.827845,-154.05446)">
          <path d="${OWL_PATH}" fill="#000"/>
        </g>
       </svg>`
    : '';

  const textWmHTML  = showTextWm  ? `<div class="text-watermark">${textWmContent}</div>` : '';
  const imgWmHTML   = (showImgWm && customImgDataUrl) ? `<img class="img-wm" src="${customImgDataUrl}" alt="">` : '';
  const monthAbbrHTML = showMonthAbbr ? `<div class="month-abbr-large">${MONTH_EN_ABB[date.getMonth()]}</div>` : '';

  const showMonth = opts.showMonthCal;
  const monthHTML = showMonth ? buildMonthCalHTML(date) : '';

  const timeRowsHTML = hours.map(h =>
    `<div class="time-row">
      <div class="time-label">${h}</div>
      <div class="time-fill"></div>
    </div>`
  ).join('');

  const memoLinesHTML = Array(5).fill('<div class="memo-line"></div>').join('');

  return `
<div class="daily-page ${wdClass}">
  ${holeSide === 'left' ? holesHTML : ''}
  <div class="page-body">
    ${watermarkHTML}
    ${imgWmHTML}
    ${textWmHTML}
    ${monthHTML}
    ${buildChecklistsHTML()}
    <div class="date-header">
      <div class="date-num">${date.getDate()}</div>
      <div class="date-meta">
        <div class="date-ym">${ymStr}</div>
        <div class="date-wd">${wdLabel}</div>
      </div>
      <div class="ns-brand">N's factory</div>
      ${monthAbbrHTML}
    </div>
    <div class="time-grid">${timeRowsHTML}</div>
    <div class="memo-section">
      <div class="memo-title">MEMO</div>
      <div class="memo-lines">${memoLinesHTML}</div>
    </div>
    <div class="page-num">${pageNum}</div>
  </div>
  ${holeSide === 'right' ? holesHTML : ''}
</div>`;
}

function openHistory() {
  const typeLabel = { feat: '機能追加', fix: '不具合修正', improve: '改善' };
  document.getElementById('historyList').innerHTML =
    [...HISTORY_ENTRIES].reverse().map(e =>
      `<div class="history-entry">
        <span class="history-date">${e.date}</span>
        <span class="history-type ${e.type}">${typeLabel[e.type] || e.type}</span>
        <div class="history-title">${e.title}</div>
        <div class="history-detail">${e.detail}</div>
      </div>`
    ).join('');
  document.getElementById('historyOverlay').classList.add('open');
}

function closeHistory() {
  document.getElementById('historyOverlay').classList.remove('open');
}

// === MODULE: Checklist ===
const clGroups = [
  { show: false, title: 'チェックリスト1', items: '', font: "'Noto Sans JP', sans-serif", size: 2.5, x: 2, y: 15 },
  { show: false, title: 'チェックリスト2', items: '', font: "'Noto Sans JP', sans-serif", size: 2.5, x: 2, y: 55 },
  { show: false, title: 'チェックリスト3', items: '', font: "'Noto Sans JP', sans-serif", size: 2.5, x: 2, y: 95 },
];

function initCLFontSelectors() {
  for (let i = 0; i < 3; i++) {
    const sel = document.getElementById(`clFont${i}`);
    if (!sel) continue;
    FONT_OPTIONS.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f.value;
      opt.textContent = f.label;
      if (f.value === clGroups[i].font) opt.selected = true;
      sel.appendChild(opt);
    });
  }
}

function toggleCL(idx) {
  clGroups[idx].show = document.getElementById(`clShow${idx}`).checked;
  render();
}

function updateCL(idx) {
  clGroups[idx].title = document.getElementById(`clTitle${idx}`).value;
  clGroups[idx].items = document.getElementById(`clItems${idx}`).value;
  clGroups[idx].font  = document.getElementById(`clFont${idx}`).value;
  clGroups[idx].size  = parseFloat(document.getElementById(`clSize${idx}`).value);
  clGroups[idx].x     = parseFloat(document.getElementById(`clX${idx}`).value);
  clGroups[idx].y     = parseFloat(document.getElementById(`clY${idx}`).value);
  document.getElementById(`clSizeVal${idx}`).textContent = clGroups[idx].size;
  document.getElementById(`clXVal${idx}`).textContent    = clGroups[idx].x;
  document.getElementById(`clYVal${idx}`).textContent    = clGroups[idx].y;
  render();
}

function buildChecklistsHTML() {
  return clGroups.map(g => {
    if (!g.show) return '';
    const items = g.items.split('\n').filter(s => s.trim()).slice(0, 10);
    const itemsHTML = items.map(s =>
      `<div class="cl-item"><span class="cl-checkbox"></span><span>${s.trim()}</span></div>`
    ).join('');
    return `<div class="cl-block" style="left:${g.x}mm;top:${g.y}mm;font-size:${g.size}mm;font-family:${g.font};">` +
      (g.title ? `<div class="cl-title">${g.title}</div>` : '') +
      itemsHTML + `</div>`;
  }).join('');
}
